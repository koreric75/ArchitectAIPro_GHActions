name: Docker Build & Security Scan

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile*'
      - 'requirements.txt'
      - 'src/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'Dockerfile*'
      - 'requirements.txt'
      - 'src/**'

env:
  REGISTRY: gcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    name: Build & Scan Docker Image

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (for scanning)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Check image size
        run: |
          docker image ls ${{ env.IMAGE_NAME }}:scan
          SIZE=$(docker image inspect ${{ env.IMAGE_NAME }}:scan --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ $SIZE_MB -gt 200 ]; then
            echo "❌ Image size (${SIZE_MB}MB) exceeds 200MB limit"
            exit 1
          fi
          echo "✅ Image size check passed (${SIZE_MB}MB)"

      - name: Test health check endpoint
        run: |
          docker run -d --name health-check ${{ env.IMAGE_NAME }}:scan
          sleep 2
          
          # Try Node.js health endpoint
          if docker exec health-check curl -f http://localhost:3000/health 2>/dev/null || \
             docker exec health-check curl -f http://localhost:8080/health 2>/dev/null; then
            echo "✅ Health check endpoint responsive"
          # Try Python health endpoint
          elif docker exec health-check curl -f http://localhost:5000/health 2>/dev/null || \
               docker exec health-check curl -f http://localhost:8080/health 2>/dev/null; then
            echo "✅ Health check endpoint responsive"
          else
            echo "⚠️ Health check endpoint not responding (may be expected)"
          fi
          
          docker stop health-check
          docker rm health-check

      - name: Verify non-root user
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:scan id
          USER=$(docker run --rm ${{ env.IMAGE_NAME }}:scan id -u)
          if [ "$USER" != "0" ]; then
            echo "✅ Container running as non-root user (UID: $USER)"
          else
            echo "❌ Container running as root user"
            exit 1
          fi

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Docker Build & Security Scan Results\n\n';
            body += '✅ Build: Passed\n';
            body += '✅ Image Size: <200MB\n';
            body += '✅ Non-root User: Verified\n';
            body += '✅ Trivy Scan: Complete (see Security tab)\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

      - name: Clean up
        if: always()
        run: |
          docker rmi ${{ env.IMAGE_NAME }}:scan || true
