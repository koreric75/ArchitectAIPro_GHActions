name: Docker Build & Security Scan

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile*'
      - 'setup.py'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'src/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'Dockerfile*'
      - 'setup.py'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'src/**'

env:
  REGISTRY: gcr.io

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    name: Build & Scan Docker Image

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (for scanning)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Check image size
        run: |
          docker image ls ${{ env.IMAGE_NAME }}:scan
          SIZE=$(docker image inspect ${{ env.IMAGE_NAME }}:scan --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ $SIZE_MB -gt 500 ]; then
            echo "Image size (${SIZE_MB}MB) exceeds 500MB limit"
            exit 1
          fi
          echo "Image size check passed (${SIZE_MB}MB)"

      - name: Test health check endpoint
        run: |
          docker run -d --name health-check ${{ env.IMAGE_NAME }}:scan
          sleep 2
          if docker exec health-check curl -sf http://localhost:3000/health 2>/dev/null || \
             docker exec health-check curl -sf http://localhost:8080/health 2>/dev/null || \
             docker exec health-check curl -sf http://localhost:5000/health 2>/dev/null; then
            echo "Health check endpoint responsive"
          else
            echo "Health check endpoint not responding (may be expected for non-server images)"
          fi
          docker stop health-check
          docker rm health-check

      - name: Verify non-root user
        run: |
          USER=$(docker run --rm ${{ env.IMAGE_NAME }}:scan id -u 2>/dev/null || echo "unknown")
          if [ "$USER" != "0" ] && [ "$USER" != "unknown" ]; then
            echo "Container running as non-root user (UID: $USER)"
          elif [ "$USER" = "unknown" ]; then
            echo "Could not determine user (may be expected)"
          else
            echo "WARNING: Container running as root user"
          fi

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = '## Docker Build & Security Scan Results\n\n' +
              '- Build: Passed\n' +
              '- Trivy Scan: Complete (see Security tab)\n';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

      - name: Clean up
        if: always()
        run: docker rmi ${{ env.IMAGE_NAME }}:scan 2>/dev/null || true